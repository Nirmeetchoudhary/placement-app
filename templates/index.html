<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Placement Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Placement Predictor</h1>
    <label>CGPA</label>
    <input id="cgpa" type="number" step="0.1" placeholder="e.g. 7.5" />
    <label>IQ</label>
    <input id="iq" type="number" step="1" placeholder="e.g. 120" />
    <button id="predictBtn">Predict</button>

    <div id="result" class="result"></div>
    <div class="note">Model input order: <b>[cgpa, iq]</b></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
